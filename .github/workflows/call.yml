name: Tablet Reminder
on:
  schedule:
    - cron: '30 3 * * *'
    - cron: '30 7 * * *'
    - cron: '30 8 * * *'
    - cron: '30 14 * * *'
    - cron: '30 16 * * *'
  workflow_dispatch:
jobs:
  call:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -X POST "https://api.twilio.com/2010-04-01/Accounts/${{ secrets.TWILIO_SID }}/Calls.json" \
          --data-urlencode "Url=${{ secrets.TWIML_URL }}" \
          --data-urlencode "To=${{ secrets.TARGET_NUMBER }}" \
          --data-urlencode "From=${{ secrets.TWILIO_NUMBER }}" \
          -u "${{ secrets.TWILIO_SID }}:${{ secrets.TWILIO_AUTH }}"
